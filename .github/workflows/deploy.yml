name: Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Railway Token File
        run: echo "${{ secrets.RAILWAY_TOKEN }}" > railway_token

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Login
        run: cat railway_token | railway login --token-stdin

      - name: Deploy
        run: railway up --prod
