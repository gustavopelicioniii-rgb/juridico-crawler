<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JurídicoCrawler — Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; }
    html { height: 100%; }
    body { font-family: 'Inter', sans-serif; background: #080d16; color: #e2e8f0; min-height: 100vh; overflow-x: hidden; }
    .mono { font-family: 'JetBrains Mono', monospace; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #1e2d42; border-radius: 99px; }
    ::-webkit-scrollbar-thumb:hover { background: #2d3f57; }

    /* ── Keyframes ── */
    @keyframes fadeUp   { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn   { from { opacity:0; } to { opacity:1; } }
    @keyframes slideRight { from { opacity:0; transform:translateX(-12px); } to { opacity:1; transform:translateX(0); } }
    @keyframes pulse2   { 0%,100%{opacity:1;} 50%{opacity:.35;} }
    @keyframes spin     { to { transform:rotate(360deg); } }
    @keyframes shimmer  { 0%{background-position:-400% 0} 100%{background-position:400% 0} }
    @keyframes flowMove { 0%{stroke-dashoffset:100} 100%{stroke-dashoffset:0} }
    @keyframes countUp  { from{opacity:0;transform:translateY(6px);} to{opacity:1;transform:translateY(0);} }
    @keyframes notifBounce { 0%,100%{transform:scale(1);} 50%{transform:scale(1.2);} }
    @keyframes drawerSlide { from{transform:translateX(100%);opacity:0;} to{transform:translateX(0);opacity:1;} }
    @keyframes modalScale { from{opacity:0;transform:scale(.96);} to{opacity:1;transform:scale(1);} }
    @keyframes barGrow  { from{width:0;} to{width:var(--target-w);} }

    .fade-up   { animation: fadeUp   .35s cubic-bezier(.22,1,.36,1) both; }
    .fade-in   { animation: fadeIn   .25s ease both; }
    .slide-r   { animation: slideRight .3s cubic-bezier(.22,1,.36,1) both; }

    /* Delay utilities */
    .d1{animation-delay:.04s} .d2{animation-delay:.08s} .d3{animation-delay:.12s}
    .d4{animation-delay:.16s} .d5{animation-delay:.2s}  .d6{animation-delay:.24s}
    .d7{animation-delay:.28s} .d8{animation-delay:.32s}

    /* ── Skeleton ── */
    .skel {
      background: linear-gradient(90deg,#0f1c2e 25%,#162235 50%,#0f1c2e 75%);
      background-size: 400% 100%;
      animation: shimmer 1.6s infinite;
      border-radius: 8px;
    }

    /* ── Sidebar ── */
    #sidebar {
      position: fixed; left:0; top:0; bottom:0;
      width: 220px; background: #0a1220;
      border-right: 1px solid #0f2035;
      display: flex; flex-direction: column;
      z-index: 40; transition: width .2s ease;
    }
    #sidebar.collapsed { width: 60px; }
    #sidebar.collapsed .nav-label,
    #sidebar.collapsed .nav-section,
    #sidebar.collapsed .sidebar-logo-text { display:none !important; }
    #sidebar.collapsed .nav-item { justify-content: center; padding: 10px; }

    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 14px; border-radius: 10px; margin: 1px 8px;
      color: #4a6080; font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all .15s; border: none; background: none; width: calc(100% - 16px); text-align: left;
    }
    .nav-item:hover { background: #0f2035; color: #7b9abf; }
    .nav-item.active { background: rgba(99,102,241,.12); color: #a5b4fc; }
    .nav-item.active svg { color: #818cf8; }
    .nav-section { font-size: 10px; font-weight: 700; color: #1e3348; letter-spacing: .1em; text-transform: uppercase; padding: 16px 22px 6px; }
    .nav-badge { background: #6366f1; color: white; font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 99px; margin-left: auto; }
    .nav-badge.red { background: #ef4444; }
    .nav-badge.amber { background: #f59e0b; }

    /* ── Main layout ── */
    #app { margin-left: 220px; transition: margin-left .2s ease; min-height: 100vh; display: flex; flex-direction: column; }
    #app.collapsed { margin-left: 60px; }

    /* ── Top bar ── */
    #topbar {
      position: sticky; top: 0; z-index: 30;
      background: rgba(8,13,22,.92); backdrop-filter: blur(16px);
      border-bottom: 1px solid #0f2035;
      padding: 0 24px; height: 54px;
      display: flex; align-items: center; justify-content: space-between;
    }

    /* ── Cards ── */
    .card {
      background: #0c1828;
      border: 1px solid #0f2035;
      border-radius: 16px;
      transition: border-color .2s;
    }
    .card:hover { border-color: #1a3050; }
    .card-glass {
      background: rgba(12,24,40,.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(15,32,53,.8);
      border-radius: 16px;
    }

    /* ── Stat cards ── */
    .stat-card {
      background: #0c1828;
      border: 1px solid #0f2035;
      border-radius: 16px; padding: 18px;
      cursor: default;
      transition: transform .15s, border-color .15s, box-shadow .15s;
    }
    .stat-card:hover { transform: translateY(-2px); border-color: #1a3050; box-shadow: 0 8px 32px rgba(0,0,0,.4); }

    /* ── Buttons ── */
    .btn-primary {
      background: linear-gradient(135deg,#5457d4,#7c3aed);
      color: white; border-radius: 10px; font-size: 13px; font-weight: 600;
      padding: 9px 18px; border: none; cursor: pointer;
      transition: opacity .15s, transform .1s, box-shadow .15s;
      display: inline-flex; align-items: center; gap: 7px;
    }
    .btn-primary:hover { opacity: .9; box-shadow: 0 4px 20px rgba(99,102,241,.3); }
    .btn-primary:active { transform: scale(.98); }
    .btn-primary:disabled { opacity: .4; cursor: not-allowed; transform: none; box-shadow: none; }

    .btn-ghost {
      background: #0f2035; color: #5a7a9a; border-radius: 9px;
      font-size: 12px; font-weight: 500; padding: 8px 14px;
      border: 1px solid #142540; cursor: pointer;
      transition: background .15s, color .15s;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-ghost:hover { background: #142540; color: #8aa0c0; }
    .btn-ghost:disabled { opacity: .4; cursor: not-allowed; }

    .btn-icon {
      background: #0f2035; border: 1px solid #142540; border-radius: 9px;
      width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background .15s, color .15s; color: #4a6080;
    }
    .btn-icon:hover { background: #142540; color: #7b9abf; }

    /* ── Inputs ── */
    .inp {
      background: #060e1a; border: 1px solid #0f2035;
      color: #c8d8e8; border-radius: 10px; outline: none;
      font-size: 13px; padding: 9px 14px;
      transition: border-color .15s, box-shadow .15s;
      font-family: 'Inter', sans-serif; width: 100%;
    }
    .inp:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,.12); }
    .inp::placeholder { color: #2a4060; }
    .inp.mono-inp { font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: .05em; }
    select.inp option { background: #0c1828; }

    /* ── Badges ── */
    .badge { display: inline-flex; align-items: center; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 99px; }
    .badge-green  { background: rgba(16,185,129,.12); color: #34d399; }
    .badge-red    { background: rgba(239,68,68,.1);   color: #f87171; }
    .badge-indigo { background: rgba(99,102,241,.12); color: #a5b4fc; }
    .badge-violet { background: rgba(139,92,246,.12); color: #c4b5fd; }
    .badge-amber  { background: rgba(245,158,11,.12); color: #fcd34d; }
    .badge-slate  { background: rgba(100,116,139,.12);color: #94a3b8; }
    .badge-demo   { background: rgba(245,158,11,.18); color: #fbbf24; border: 1px solid rgba(245,158,11,.3); }
    .badge-up   { background: rgba(16,185,129,.1); color: #34d399; }
    .badge-down { background: rgba(239,68,68,.1);  color: #f87171; }

    /* ── Polo ── */
    .polo-ativo   { background: rgba(99,102,241,.1); color: #a5b4fc; border: 1px solid rgba(99,102,241,.2); }
    .polo-passivo { background: rgba(239,68,68,.09); color: #fca5a5; border: 1px solid rgba(239,68,68,.2); }
    .polo-adv     { background: rgba(245,158,11,.1); color: #fcd34d; border: 1px solid rgba(245,158,11,.2); }
    .polo-outros  { background: rgba(100,116,139,.1);color: #94a3b8; border: 1px solid rgba(100,116,139,.2); }

    /* ── Timeline ── */
    .tl-line { position:absolute; left:7px; top:20px; bottom:0; width:1.5px; background:linear-gradient(to bottom,#1a3558,transparent); }
    .tl-dot  { width:16px; height:16px; border-radius:50%; flex-shrink:0; border:2.5px solid #080d16; }

    /* ── Spinner ── */
    .spinner { width:18px; height:18px; border:2px solid rgba(99,102,241,.2); border-top-color:#6366f1; border-radius:50%; animation:spin .6s linear infinite; }

    /* ── Status dot ── */
    .dot-online  { background:#10b981; box-shadow:0 0 0 3px rgba(16,185,129,.15); }
    .dot-offline { background:#ef4444; box-shadow:0 0 0 3px rgba(239,68,68,.15); }
    .dot-demo    { background:#f59e0b; box-shadow:0 0 0 3px rgba(245,158,11,.15); }

    /* ── Tab ── */
    .tab-btn { color:#3a5878; border-bottom:2px solid transparent; transition:all .15s; font-size:12px; font-weight:600; padding:12px 0; }
    .tab-btn.active { color:#a5b4fc; border-bottom-color:#6366f1; }
    .tab-btn:hover:not(.active) { color:#6a8aaa; }

    /* ── Table ── */
    .trow { transition: background .12s; cursor: pointer; }
    .trow:hover { background: rgba(99,102,241,.04); }

    /* ── Notification drawer ── */
    #notifDrawer {
      display:none;
      position:fixed; right:0; top:0; bottom:0; width:340px;
      background:#090f1c; border-left:1px solid #0f2035;
      z-index:60;
      flex-direction:column;
    }
    #notifDrawer.open {
      display:flex;
      animation:drawerSlide .25s cubic-bezier(.22,1,.36,1);
    }

    /* ── Process modal ── */
    #modalOverlay {
      display:none;
      position:fixed; inset:0; background:rgba(0,0,0,.7); backdrop-filter:blur(4px);
      z-index:50; align-items:flex-start; justify-content:center;
      padding: 24px;
    }
    #modalOverlay.open {
      display:flex;
    }

    /* ── Notification backdrop ── */
    #notifBackdrop {
      display:none;
      position:fixed; inset:0; z-index:59; background:transparent;
    }
    #modalBox {
      background:#0a1220; border:1px solid #1a3050; border-radius:20px;
      width:100%; max-width:820px; max-height:calc(100vh - 48px);
      overflow-y:auto; animation:modalScale .22s cubic-bezier(.22,1,.36,1);
    }

    /* ── Party duel ── */
    .party-col {
      background: #060e1a; border: 1px solid #0f2035;
      border-radius: 14px; padding: 16px; flex: 1;
    }
    .party-vs {
      display:flex; align-items:center; justify-content:center;
      width:36px; flex-shrink:0;
    }

    /* ── Flow SVG ── */
    .flow-path { stroke-dasharray: 8 4; animation: flowMove 1.5s linear infinite; }

    /* ── Progress bar ── */
    .prog-bar { height:6px; border-radius:99px; background:#0f2035; overflow:hidden; }
    .prog-fill { height:100%; border-radius:99px; animation: barGrow .7s cubic-bezier(.22,1,.36,1) both; }

    /* ── Glow effects ── */
    .glow-indigo { box-shadow: 0 0 20px rgba(99,102,241,.15); }
    .glow-green  { box-shadow: 0 0 20px rgba(16,185,129,.12); }
    .glow-amber  { box-shadow: 0 0 20px rgba(245,158,11,.12); }
    .glow-red    { box-shadow: 0 0 20px rgba(239,68,68,.12); }

    /* ── Chart container ── */
    .chart-wrap { position:relative; }

    /* ── Process card ── */
    .proc-card {
      background:#0c1828; border:1px solid #0f2035; border-radius:14px;
      padding:14px 16px; cursor:pointer;
      transition: border-color .15s, transform .15s, box-shadow .15s;
    }
    .proc-card:hover { border-color:#2a4a70; transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,.4); }

    /* search highlight */
    mark { background:rgba(99,102,241,.25); color:#a5b4fc; border-radius:2px; }

    /* Impact */
    .imp-positivo { background:rgba(16,185,129,.1);  color:#6ee7b7; }
    .imp-negativo { background:rgba(239,68,68,.09);  color:#fca5a5; }
    .imp-urgente  { background:rgba(245,158,11,.11); color:#fcd34d; }
    .imp-neutro   { background:rgba(99,102,241,.1);  color:#a5b4fc; }

    /* ── Responsive ── */
    @media(max-width:768px){
      #sidebar{width:0;overflow:hidden;}
      #app{margin-left:0;}
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════
     SIDEBAR
═══════════════════════════════════════════════ -->
<nav id="sidebar">
  <!-- Logo -->
  <div class="flex items-center gap-3 px-4 h-14 border-b border-[#0f2035] flex-shrink-0">
    <div class="w-8 h-8 rounded-xl bg-gradient-to-br from-indigo-500 to-violet-700 flex items-center justify-center flex-shrink-0">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
      </svg>
    </div>
    <div class="sidebar-logo-text min-w-0">
      <p class="text-[13px] font-bold text-white leading-none">JurídicoCrawler</p>
      <p class="text-[10px] text-[#2a4060] mt-0.5">v2.0 · Dashboard</p>
    </div>
  </div>

  <!-- Nav -->
  <div class="flex-1 overflow-y-auto py-2">
    <p class="nav-section">Principal</p>
    <button class="nav-item active" onclick="showPage('overview')" data-page="overview">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      <span class="nav-label">Overview</span>
    </button>
    <button class="nav-item" onclick="showPage('processos')" data-page="processos">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <span class="nav-label">Processos</span>
      <span class="nav-badge" id="nb-processos">—</span>
    </button>
    <button class="nav-item" onclick="showPage('partes')" data-page="partes">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span class="nav-label">Partes & OAB</span>
    </button>
    <button class="nav-item" onclick="showPage('prazos')" data-page="prazos">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span class="nav-label">Prazos</span>
      <span class="nav-badge amber" id="nb-prazos">—</span>
    </button>
    <button class="nav-item" onclick="showPage('monitoramento')" data-page="monitoramento">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      <span class="nav-label">Monitoramento</span>
      <span class="nav-badge" id="nb-mon">—</span>
    </button>

    <p class="nav-section">Ferramentas</p>
    <button class="nav-item" onclick="showPage('busca')" data-page="busca">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span class="nav-label">Buscar Processo</span>
    </button>
    <button class="nav-item" onclick="showPage('arquitetura')" data-page="arquitetura">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
      <span class="nav-label">Arquitetura</span>
    </button>
    <button class="nav-item" onclick="showPage('apidocs')" data-page="apidocs">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
      <span class="nav-label">API Docs</span>
    </button>
  </div>

  <!-- Bottom: API Config -->
  <div class="border-t border-[#0f2035] p-3 flex-shrink-0 space-y-2">
    <input type="text" id="api-url" class="inp text-[10px] mono-inp" value="http://127.0.0.1:8000" placeholder="URL da API" />
    <input id="cfgKey" type="password" class="inp text-[11px]" style="padding:6px 10px;" placeholder="X-API-Key (opcional)" />
    <button onclick="reconnect()" class="btn-ghost w-full justify-center text-[11px]" style="padding:6px;">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      Reconectar
    </button>
  </div>
</nav>

<!-- ═══════════════════════════════════════════════
     APP
═══════════════════════════════════════════════ -->
<div id="app">

  <!-- TOP BAR -->
  <header id="topbar">
    <div class="flex items-center gap-3">
      <button class="btn-icon" onclick="toggleSidebar()" title="Toggle sidebar">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <div id="breadcrumb" class="text-sm text-[#3a5878] font-medium">
        <span class="text-white">Overview</span>
      </div>
    </div>

    <div class="flex items-center gap-2">
      <!-- Demo badge -->
      <span id="demoBadge" class="badge badge-demo hidden">⚡ MODO DEMO</span>

      <!-- Status -->
      <div class="flex items-center gap-2 bg-[#060e1a] border border-[#0f2035] rounded-xl px-3 py-1.5">
        <div id="statusDot" class="w-2 h-2 rounded-full dot-offline" style="animation:pulse2 2s infinite;"></div>
        <span id="statusTxt" class="text-[11px] text-[#3a5878]">Conectando...</span>
      </div>

      <!-- Search quick -->
      <div class="relative">
        <input id="quickSearch" class="inp text-xs w-48" style="padding:7px 12px 7px 32px;" placeholder="Busca rápida..." oninput="quickSearchFn(this.value)" />
        <svg class="absolute left-2.5 top-1/2 -translate-y-1/2 text-[#2a4060]" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <div id="quickResults" class="hidden absolute top-full left-0 right-0 mt-1 bg-[#0a1220] border border-[#1a3050] rounded-xl shadow-2xl overflow-hidden z-50 max-h-64 overflow-y-auto"></div>
      </div>

      <!-- Notifications -->
      <button class="btn-icon relative" onclick="toggleNotif()" title="Notificações">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span id="notifBadge" class="hidden absolute -top-1 -right-1 w-4 h-4 bg-red-500 rounded-full text-[9px] font-bold text-white flex items-center justify-center" style="animation:notifBounce 2s ease infinite">!</span>
      </button>

      <!-- Clock -->
      <div class="text-[11px] text-[#2a4060] mono" id="clock">--:--:--</div>
    </div>
  </header>

  <!-- PAGE CONTENT -->
  <main id="pageContent" class="flex-1 p-6 space-y-5 max-w-screen-2xl mx-auto w-full">
    <!-- Rendered by JS -->
  </main>
</div>

<!-- ═══════════════════════════════════════════════
     NOTIFICATION BACKDROP
═══════════════════════════════════════════════ -->
<div id="notifBackdrop" onclick="toggleNotif()"></div>

<!-- ═══════════════════════════════════════════════
     NOTIFICATION DRAWER
═══════════════════════════════════════════════ -->
<div id="notifDrawer">
  <div class="flex items-center justify-between p-4 border-b border-[#0f2035]">

function apiBase() { return (document.getElementById('api-url')?.value || 'http://127.0.0.1:8000').replace(/\/$/,''); }
function apiKey()  { return document.getElementById('cfgKey')?.value || ''; }
function apiHeaders() {
  const h = {'Content-Type':'application/json'};
  const k = apiKey(); if(k) h['X-API-Key'] = k;
  return h;
}
async function apiFetch(path, opts={}) {
  const r = await fetch(apiBase()+path, {headers:apiHeaders(),...opts});
  if(!r.ok){ const e=await r.json().catch(()=>({detail:r.statusText})); throw new Error(e.detail||`HTTP ${r.status}`); }
  return r.json();
}

function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function impactConf(imp){
  const m={POSITIVO:{dot:'bg-emerald-400',cls:'imp-positivo'},NEGATIVO:{dot:'bg-red-400',cls:'imp-negativo'},URGENTE:{dot:'bg-amber-400',cls:'imp-urgente'},NEUTRO:{dot:'bg-indigo-400',cls:'imp-neutro'}};

}
function cnj14(s){
  const d=s.replace(/\D/g,'');
  if(d.length===0)return s;
  let r=d;
  if(d.length>7) r=d.slice(0,7)+'-'+d.slice(7);
  if(d.length>9) r=r.slice(0,10)+'.'+r.slice(10);
  if(d.length>13)r=r.slice(0,15)+'.'+r.slice(15);
  if(d.length>14)r=r.slice(0,17)+'.'+r.slice(17);
  if(d.length>16)r=r.slice(0,20)+'.'+r.slice(20);
  return r.slice(0,25);
}

  const backdrop = document.getElementById('notifBackdrop');
  if(state.notifOpen){
    drawer.classList.add('open');

  } else {

function renderNotifDrawer(){
  const notifs = state.notificacoes;
  const unread = notifs.filter(n=>!n.lida).length;
  const list=document.getElementById('notifList');
  const badge=document.getElementById('notifBadge');

  if(unread>0) badge.textContent=unread;

  if(notifs.length===0){
    list.innerHTML='<p class="text-xs text-[#3a5878] text-center py-8">Nenhuma notificação</p>';
    return;
  }
  const typeConf={NOVA_MOVIMENTACAO:{icon:'activity',color:'text-indigo-400'},PRAZO_VENCENDO:{icon:'alert',color:'text-amber-400'}};
  list.innerHTML=notifs.map((n,i)=>{
    const tc=typeConf[n.tipo]||{icon:'bell',color:'text-slate-400'};
    const proc=state.processos.find(p=>p.id===n.processo_id);

// QUICK SEARCH
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function quickSearchFn(q){
  const box=document.getElementById('quickResults');
  if(!q||q.length<2){box.classList.add('hidden');return;}
  const ql=q.toLowerCase();
  const hits=state.processos.filter(p=>
    p.numero_cnj.includes(q)||
    p.tribunal.includes(ql)||
    (p.comarca||'').toLowerCase().includes(ql)||
    (p.classe_processual||'').toLowerCase().includes(ql)||
    p.partes?.some(pt=>pt.nome.toLowerCase().includes(ql))
  ).slice(0,5);
  if(hits.length===0){box.classList.add('hidden');return;}
  box.classList.remove('hidden');
  box.innerHTML=hits.map(p=>`
    <div class="flex items-center gap-3 px-3 py-2.5 hover:bg-[#0f2035] cursor-pointer transition-colors" onclick="openModal(${p.id});document.getElementById('quickSearch').value='';document.getElementById('quickResults').classList.add('hidden');">
      <span class="badge badge-indigo text-[9px] uppercase">${p.tribunal}</span>
      <div class="min-w-0">
        <p class="text-xs text-white mono truncate">${p.numero_cnj}</p>
        <p class="text-[10px] text-[#3a5878] truncate">${p.classe_processual||p.situacao||'—'}</p>
      </div>
    </div>`).join('');
}
document.addEventListener('click',e=>{
  if(!document.getElementById('quickSearch').contains(e.target) && !document.getElementById('quickResults').contains(e.target))
    document.getElementById('quickResults').classList.add('hidden');
});

  const p = state.processos.find(x=>x.id===procId); if(!p) return;
  state.currentProc=p;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow='hidden';

          </div>
        </div>

      ${adv.map(a=>`<div class="mt-2 bg-[#0a1828] rounded-lg p-2 flex items-center gap-2">
        <div class="w-6 h-6 rounded-lg bg-amber-600/15 flex items-center justify-center flex-shrink-0">

        </div>

    </div>`).join('');

  }

  return `
    <div class="flex gap-4 items-stretch mb-4">
      <div class="party-col border-indigo-500/20">

function renderTimeline(movs){
  if(!movs.length) return '<p class="text-xs text-[#3a5878] text-center py-8">Nenhuma movimentação</p>';
  const sorted=[...movs].sort((a,b)=>new Date(b.data_movimentacao)-new Date(a.data_movimentacao));
  return `<div class="relative pl-6 space-y-5"><div class="tl-line"></div>${sorted.map((m,i)=>{
    const c=impactConf(m.impacto);
    return `<div class="flex gap-3 slide-r d${Math.min(i+1,8)}">
      <div class="tl-dot ${c.dot} flex-shrink-0"></div>
      <div class="flex-1 pb-1">
        <div class="flex items-center gap-2 flex-wrap mb-1">
          <span class="text-xs font-semibold text-white">${escHtml(m.tipo||m.descricao?.slice(0,40)||'—')}</span>
          ${m.impacto?`<span class="badge ${c.cls} text-[9px]">${m.impacto}</span>`:''}
          ${m.categoria?`<span class="badge badge-slate text-[9px]">${m.categoria}</span>`:''}
          <span class="text-[10px] text-[#2a4060] ml-auto">${fmtD(m.data_movimentacao)}</span>
        </div>
        <p class="text-xs text-[#5a7a9a] leading-relaxed">${escHtml(m.descricao||'')}</p>
        ${m.complemento?`<p class="text-[10px] text-[#3a5070] mt-1 italic">${escHtml(m.complemento)}</p>`:''}
      </div>
    </div>`;
  }).join('')}</div>`;
}

function renderPrazosModal(proc){
  const prazos=state.prazos.filter(p=>p.processo_id===proc.id);
  if(!prazos.length) return '<p class="text-xs text-[#3a5878] text-center py-8">Nenhum prazo registrado para este processo</p>';
  return `<div class="space-y-3">${prazos.map(p=>{
    const dias=Math.ceil((new Date(p.data_vencimento)-new Date())/86400000);
    const urgente=dias<=7&&!p.cumprido;
    return `<div class="bg-[#060e1a] border ${urgente?'border-amber-500/25':'border-[#0f2035]'} rounded-xl p-4 flex items-center gap-4">
      <div class="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0 ${urgente?'bg-amber-600/15':'bg-[#0c1828]'}">
        ${icon('clock',16)}
      </div>
      <div class="flex-1">
        <p class="text-xs font-semibold text-white">${escHtml(p.descricao)}</p>
        <div class="flex gap-2 mt-1"><span class="badge badge-slate text-[9px]">${escHtml(p.tipo_prazo)}</span></div>
      </div>
      <div class="text-right">
        <p class="text-sm font-bold ${urgente?'text-amber-400':'text-white'}">${fmtD(p.data_vencimento)}</p>
        <p class="text-[10px] ${urgente?'text-amber-400/70':'text-[#2a4060]'}">${p.cumprido?'✓ Cumprido':dias<0?'Vencido':dias===0?'Hoje':dias+' dias'}</p>
      </div>
    </div>`;
  }).join('')}</div>`;
}

function renderPage(){
  destroyCharts();
  const pc=document.getElementById('pageContent');
  pc.className='flex-1 p-6 max-w-screen-2xl mx-auto w-full';
  switch(state.page){
    case 'overview':     renderOverview(); break;
    case 'processos':    renderProcessos(); break;
    case 'partes':       renderPartes(); break;

    case 'monitoramento':renderMonitoramento(); break;
    case 'busca':        renderBusca(); break;
    case 'arquitetura':  renderArquitetura(); break;
    case 'apidocs':      renderApiDocs(); break;
  }
}

function buscarParteLocal(){
  const q=(document.getElementById('oabInp')?.value||'').trim().toLowerCase();
  const res=document.getElementById('oabResult');
  if(!q){res.innerHTML='';return;}
  const hits=state.processos.flatMap(p=>(p.partes||[]).filter(pt=>pt.nome.toLowerCase().includes(q)||(pt.oab||'').toLowerCase().includes(q)).map(pt=>({...pt,proc:p})));
  if(!hits.length){res.innerHTML='<p class="text-xs text-[#3a5878]">Nenhuma parte encontrada</p>';return;}
  res.innerHTML=`<div class="space-y-2">${hits.slice(0,10).map(h=>`
    <div class="bg-[#060e1a] rounded-xl p-3 flex items-center gap-3 cursor-pointer hover:bg-[#0a1828] transition-colors" onclick="openModal(${h.proc.id})">
      <div class="w-8 h-8 rounded-xl ${h.tipo_parte==='ADVOGADO'?'bg-amber-600/15 text-amber-400':(h.polo==='ATIVO'?'bg-indigo-600/15 text-indigo-400':'bg-slate-600/15 text-slate-400')} flex items-center justify-center font-bold text-xs flex-shrink-0">${h.nome.charAt(0)}</div>
      <div class="flex-1 min-w-0">
        <p class="text-xs font-semibold text-white">${escHtml(h.nome)}</p>
        <div class="flex gap-1.5 mt-0.5 flex-wrap">
          ${h.oab?`<span class="badge polo-adv text-[9px]">OAB ${escHtml(h.oab)}</span>`:''}
          <span class="badge badge-slate text-[9px]">${escHtml(h.tipo_parte)}</span>
        </div>
      </div>
      <p class="text-[10px] text-[#3a5878] mono">${escHtml(h.proc.numero_cnj)}</p>
    </div>`).join('')}</div>`;
}

async function executarBusca(){
  const cnj=document.getElementById('cnjInp')?.value.trim();
  const tribunal=document.getElementById('tribunalSel')?.value;
  const useAI=document.getElementById('useAI')?.checked;
  const errEl=document.getElementById('buscaError');
  const statusEl=document.getElementById('buscaStatus');
  const resultEl=document.getElementById('buscaResult');

  errEl.classList.add('hidden'); resultEl.innerHTML='';
  if(!cnj){errEl.textContent='⚠ Informe o número CNJ'; errEl.classList.remove('hidden'); return;}
  if(!tribunal){errEl.textContent='⚠ Selecione o tribunal'; errEl.classList.remove('hidden'); return;}

  statusEl.classList.remove('hidden');
  document.getElementById('buscaStatusTxt').textContent='Consultando '+tribunal.toUpperCase()+'...';
  document.getElementById('btnBuscar').disabled=true;

  try{
    const data=await apiFetch('/api/integracao/processo',{method:'POST',body:JSON.stringify({numero_cnj:cnj,tribunal,webhook_url:null})});
    statusEl.classList.add('hidden');
    document.getElementById('btnBuscar').disabled=false;
    // Add to state and open modal
    const exists=state.processos.find(p=>p.numero_cnj===data.numero_cnj);
    if(!exists) state.processos.unshift(data);
    else Object.assign(exists,data);
    resultEl.innerHTML=`<div class="card p-4 border-emerald-500/15 glow-green"><p class="text-xs font-bold text-emerald-400 mb-2">✓ Processo encontrado e indexado</p><p class="text-xs text-white mono">${escHtml(data.numero_cnj)}</p><button class="btn-ghost mt-3 w-full justify-center" onclick="openModal(${data.id})">Ver detalhes completos</button></div>`;
    updateNavBadges();
  }catch(e){
    statusEl.classList.add('hidden');
    document.getElementById('btnBuscar').disabled=false;
    errEl.textContent='⚠ '+e.message;
    errEl.classList.remove('hidden');
  }
}

async function executarBuscaOAB(){
  const oab=document.getElementById('oabSearchInp')?.value.trim();
  const statusEl=document.getElementById('oabStatus');
  if(!oab){return;}
  statusEl.classList.remove('hidden');
  try{
    const data=await apiFetch('/api/integracao/oab',{method:'POST',body:JSON.stringify({numero_oab:oab.split('/')[0], uf_oab:oab.split('/')[1]||'SP', nome_advogado:''})});
    statusEl.classList.add('hidden');
    const items=data.processos||[];
    document.getElementById('buscaResult').innerHTML=`<div class="card"><div class="p-4 border-b border-[#0f2035]"><p class="text-sm font-bold text-white">${items.length} processos encontrados para OAB ${escHtml(oab)}</p></div><div class="divide-y divide-[#080d16]">${items.slice(0,15).map(p=>`<div class="flex items-center gap-3 px-4 py-3 hover:bg-[#0a1828] cursor-pointer" onclick="openModal(${p.id})"><span class="badge badge-indigo text-[9px]">${p.tribunal}</span><p class="text-xs text-white mono flex-1 truncate">${p.numero_cnj}</p><p class="text-[10px] text-[#3a5878]">${p.situacao||'—'}</p></div>`).join('')}</div></div>`;
  }catch(e){
    statusEl.classList.add('hidden');
    document.getElementById('buscaResult').innerHTML=`<div class="p-3 bg-red-950/30 border border-red-800/30 rounded-xl text-xs text-red-400">⚠ ${escHtml(e.message)}</div>`;
  }
}

  try{
    await apiFetch('/health');

    try{
      const r=await apiFetch('/api/processos');
      state.processos=(r.processos||r.items||r||[]);
    }catch{}
    try{ state.monitoramentos=[]; }catch{}
    try{
      const n=await apiFetch('/api/notificacoes');
      state.notificacoes=Array.isArray(n)?n:[];
    }catch{ state.notificacoes=[];}
    try{
      const p=await apiFetch('/api/prazos/vencendo?dias=30');

      state.notificacoes=DEMO.notificacoes;

      dot.className='w-2 h-2 rounded-full dot-demo';
      txt.textContent='API online · sem dados'; txt.style.color='#fbbf24';

    state.notificacoes=DEMO.notificacoes;

    txt.textContent='Modo Demo'; txt.style.color='#fbbf24';
    demoBadge.classList.remove('hidden');
  }

  updateNavBadges();
  renderPage();
}
