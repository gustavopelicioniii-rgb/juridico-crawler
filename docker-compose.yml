services:
  # --------------------------------------------------------
  # PostgreSQL
  # --------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: juridico_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: juridico_crawler
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/database/migrations/001_initial.sql:/docker-entrypoint-initdb.d/001_initial.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d juridico_crawler"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------
  # API FastAPI
  # --------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: juridico_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/juridico_crawler
    ports:
      - "8080:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./main.py:/app/main.py
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
